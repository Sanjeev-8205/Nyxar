name: Deploy Backend to HF Spaces

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      TESTING: "true"
      PROTECT_API_KEY: "test-key"
      GEMINI_API_KEY: "test-key"
      GROQ_API_KEY: "test-key"
      PROMETHEUS_METRICS_USERNAME: "test-name"
      PROMETHEUS_METRICS_PASSWORD: "test-pass"
      USE_MOCK_LLM: "true"

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements-ci.txt
            backend/requirements-test.txt

      - name: Clear pip cache
        run: pip cache purge

      - name: Install PostgreSQL client libs
        run: sudo apt-get install -y libpq-dev

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements-ci.txt
          pip install -r requirements-test.txt
          python -c "import psycopg2; print(psycopg2.__file__)"

      - name: Run unit tests
        working-directory: backend
        env:
          DATABASE_URL: "sqlite:///:memory:"
        run: |
          pytest tests/unit -v

      - name: Debug psycopg2 connection
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          run: |
            python -c "
            import os, psycopg2
            print('psycopg2 path:', psycopg2.__file__)
            print('libpq version:', psycopg2.__libpq_version__)
            print('Attempting connection...')
            conn = psycopg2.connect(os.environ['DATABASE_URL'])
            print('SUCCESS')
            conn.close()
            "
        run: |
          pytest tests/integration -v

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Clone HF Spaces repo
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://Sanjeev2501:$HF_TOKEN@huggingface.co/spaces/Sanjeev2501/nyxar hf-space

      - name: Sync backend/ to HF Spaces root
        run: |
          rsync -av --delete \
            --exclude='.git' \
            backend/ hf-space/

      - name: Commit and push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd hf-space

          git config user.email "sanjeev.820525@gmail.com"
          git config user.name "Sanjeev2501"

          git add .

          COMMIT_MSG=$(git -C "$GITHUB_WORKSPACE" log -1 --pretty=%s ${{ github.sha }})

          git diff --cached --quiet || git commit -m "$COMMIT_MSG"

          git push