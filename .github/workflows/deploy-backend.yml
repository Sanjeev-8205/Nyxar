name: "Deploy Backend to HF Spaces"

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-test.txt
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install -r requirements-test.txt
      
      - name: Run tests
        env:
          TESTING: "true"
          PROTECT_API_KEY: "test-key"
        run: |
          cd backend
          pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      
      - name: Clone HF Spaces repo
        env:
          HF_TOKEN: ${{secrets.HF_TOKEN}}
        run: |
          git clone https://Sanjeev2501:$HF_TOKEN@huggingface.co/spaces/Sanjeev2501/nyxar hf-space
      
      - name: Sync backend/ to HF Spaces root
        run: |
          rsync -av --delete \
            --exclude='.git' \
            backend/ hf-space/
        
      - name: Commit and push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd hf-space
          git config user.email "sanjeev.820525@gmail.com"
          git config user.name "Sanjeev2501"
          git add .
          git diff --cached --quiet || git commit -m "sync: from GitHub main @ ${{ github.sha }}"
          git push